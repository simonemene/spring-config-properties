
spring.cloud.function.definition=orderCheckAvailable


#properties per farlo partire in locale(sovrascritto da docker)
spring.cloud.stream.bindings.orderCheckAvailable-out-0.destination=stock-topic
spring.cloud.stream.bindings.orderCheckAvailable-in-0.destination=order-topic
spring.cloud.stream.bindings.orderCheckAvailable-in-0.group=check-available-group
spring.config.import=optional:configserver:http://localhost:8071/

#cloud bus
spring.cloud.bus.destination=spring-cloud-bus
spring.kafka.bootstrap-servers=localhost:9092

#transaction kafka
spring.cloud.stream.kafka.binder.transaction.transaction-id-prefix= tx-

#idempotency
spring.cloud.stream.kafka.binder.configuration.enable.indempotence=true
spring.cloud.stream.kafka.binder.configuration.acks=all
spring.cloud.stream.kafka.binder.configuration.isolation.level=read_committed


#dlq
spring.cloud.stream.kafka.bindings.orderCheckAvailable-in-0.consumer.enable-dlq=true
spring.cloud.stream.kafka.bindings.orderCheckAvailable-in-0.consumer.dlq-name=order-topic.dlq

#db
spring.datasource.url=jdbc:http://localhost:3036/dbtest
spring.datasource.user=user
spring.datasource.password=user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.cloud.stream.bindings.orderCheckAvailable-in-0.consumer.retryable-exceptions.com.eventdriven.processor.exception.InvalidEventException=false

management.server.port=8091

